name: Windoww branch build

on:
  push:
    branches:
      - '**'

env:
  JAVA_HOME: /home/runner/jdk
  GRAALVM_HOME: /home/runner/jdk

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3
#      - name: Add msbuild to PATH
#        uses: microsoft/setup-msbuild@v1.0.2
#      - name: Visual Studio shell
#        uses: egor-tensin/vs-shell@v1
      - uses: robinraju/release-downloader@v1.10
        with:
          repository: "gluonhq/graal"
          tag: "gluon-22.1.0.1-Final"
          fileName: "*java17-windows-gluon-*.zip "
      - name: Extract JDK
        run: |
          mkdir -p %JAVA_HOME%
          echo %HOME%
          cd %JAVA_HOME%
          unzip -j *java17-linux-gluon*.zip
          dir
          cd %HOME%
      - name: Make staging directory
        run: mkdir staging

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          save-always: true
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build with Maven
        run: ./mvnw -B clean install
      - name: Build native
        run: ./mvnw gluonfx:build -f sdkman-ui
        # Run only on main branch
        if: ${{ github.ref == 'refs/heads/main' }}

      # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      - name: Update dependency graph
        if: ${{ github.ref == 'refs/heads/main' }} # Only do this on main branch
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6