# Example from: https://raw.githubusercontent.com/actions/starter-workflows/main/ci/maven.yml
# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Cache skdman binaries
        id: cache-sdkman
        uses: actions/cache@v4
        env:
          cache-name: cache-skdman
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.sdkman
          save-always: true
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/.sdkmanrc') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - uses: sdkman/sdkman-action@b1f9b696c79148b66d3d3a06f7ea801820318d0f
        id: sdkman
      - name: Verify Java and Maven
        run: ./mvnw -version
        env:
          JAVA_HOME: ~/.sdkman/candidates/java/current
          GRAALVM_HOME: ~/.sdkman/candidates/java/current

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          save-always: true
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build with Maven
        run: ./mvnw -B clean install
        env:
          JAVA_HOME: ~/.sdkman/candidates/java/current
          GRAALVM_HOME: ~/.sdkman/candidates/java/current

      # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      - name: Update dependency graph
        if: ${{ github.ref == 'refs/heads/main' }} # Only do this on main branch
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6